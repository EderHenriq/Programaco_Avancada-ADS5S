<div class="container mt-4">
  <div class="row">
    <div class="col-md-8 offset-md-2">
      <h3>Cadastro de Usuário</h3>
      <br>

      <form [formGroup]="meuFormulario" (ngSubmit)="enviarCadastro()">
        
        <h4>Dados Pessoais</h4>
        <div class="mb-3">
          <label for="nome" class="form-label">Nome Completo:</label>
          <input type="text" id="nome" class="form-control" formControlName="nome" placeholder="Digite seu nome">
        </div>

        <div class="mb-3">
          <label for="email" class="form-label">E-mail:</label>
          <input type="email" id="email" class="form-control" formControlName="email" placeholder="E-mail">
        </div>

        <div class="mb-3">
          <label for="senha" class="form-label">Senha:</label>
          <input type="password" id="senha" class="form-control" formControlName="senha" placeholder="Crie uma senha">
        </div>

        <hr>

        <h4>Telefones para Contato</h4>
        <button type="button" class="btn btn-secondary mb-3" (click)="adicionarTelefone()">
          Adicionar Telefone
        </button>

        <div formArrayName="telefones">
          @for (t of telefones.controls; track $index) {
          <div class="row mb-2" [formGroupName]="$index">
            <div class="col-md-5">
              <label class="form-label">Número:</label>
              <input type="text" class="form-control" formControlName="numero" placeholder="(DDD) 00000-0000">
            </div>

            <div class="col-md-4">
              <label class="form-label">Tipo:</label>
              <select class="form-select" formControlName="tipo">
                <option value="Celular">Celular</option>
                <option value="Comercial">Comercial</option>
                <option value="Residencial">Residencial</option>
              </select>
            </div>

            <div class="col-md-3 d-flex align-items-end">
              <button type="button" class="btn btn-danger w-100" (click)="removerTelefone($index)">
                Remover
              </button>
            </div>


          </div>
          }
        </div>

        <br>
        <button type="submit" class="btn btn-primary">Cadastrar</button>

      </form>


    </div>
  </div>
</div>
